name: Sign & Notarize Daemon

# Builds, code-signs, and notarizes the offlidd daemon on release tags.
# Stub: secrets (Developer ID cert, App Store Connect API key) are provided in
# repo settings. Fill in the signing identity + notary profile before release.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  sign-notarize:
    runs-on: macos-14
    strategy:
      matrix:
        arch: [arm64, amd64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build daemon (${{ matrix.arch }})
        working-directory: apps/daemon
        run: |
          GOOS=darwin GOARCH=${{ matrix.arch }} \
            go build -trimpath -o bin/offlidd-darwin-${{ matrix.arch }} ./cmd/offlidd

      # TODO: import Developer ID Application certificate from secrets into a
      # temporary keychain (APPLE_CERT_P12 + APPLE_CERT_PASSWORD).
      - name: Code sign
        run: |
          echo "TODO: codesign --force --options runtime --timestamp \\"
          echo "  --sign \"$APPLE_SIGN_IDENTITY\" apps/daemon/bin/offlidd-darwin-${{ matrix.arch }}"

      # TODO: submit to Apple notary service and staple the ticket.
      - name: Notarize
        run: |
          echo "TODO: xcrun notarytool submit --keychain-profile offlid-notary --wait"
          echo "TODO: xcrun stapler staple apps/daemon/bin/offlidd-darwin-${{ matrix.arch }}"

      # TODO: emit SHA-256 + cosign signature alongside each artifact so the
      # launcher (apps/cli/src/verify.ts) can verify downloads.
      - name: Checksum & sign artifact
        run: |
          echo "TODO: shasum -a 256 <artifact> > <artifact>.sha256"
          echo "TODO: cosign sign-blob --yes <artifact> > <artifact>.sig"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: apps/daemon/bin/offlidd-darwin-${{ matrix.arch }}*
